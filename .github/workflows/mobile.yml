name: Test & Deploy Mobile

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Build Android test APK
        run: cd android && ./gradlew assembleDebugAndroidTest

      - name: Run Gradle tests
        run: cd android && ./gradlew testDebugUnitTest

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/coverage-final.json
          flags: unittests
          fail_ci_if_error: false
        continue-on-error: true

  build-android-release:
    needs: test-android
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build Android Release Bundle
        run: cd android && ./gradlew bundleRelease

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-bundle
          path: android/app/build/outputs/bundle/release/app-release.aab

  deploy-android-internal:
    needs: build-android-release
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Ruby & Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.1
          bundler-cache: false

      - name: Install Fastlane
        run: gem install fastlane

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: android-bundle
          path: android/app/build/outputs/bundle/release/

      - name: Deploy to Google Play Internal Track
        env:
          PLAY_STORE_CONFIG_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$PLAY_STORE_CONFIG_JSON" ]; then
            echo "Warning: GOOGLE_PLAY_SERVICE_ACCOUNT secret not configured. Skipping deployment."
            exit 0
          fi
          echo $PLAY_STORE_CONFIG_JSON > service-account.json
          cd fastlane && fastlane android deploy_internal
        continue-on-error: true

  lint-and-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint
        continue-on-error: true
